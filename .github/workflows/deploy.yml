name: CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to FH server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/blueroute/PoC
            git pull
            docker-compose down
            docker-compose up -d --build