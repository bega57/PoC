services:
  postgres:
    image: postgres:16
    container_name: blueroute-postgres
    environment:
      POSTGRES_DB: blueroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend/blue-route
    container_name: blueroute-backend
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/blueroute
      DB_USER: postgres
      DB_PASSWORD: postgres
      PLAYER_SERVICE_URL: http://player-service:8081
      SHIP_SERVICE_URL: http://ship-service:8082
      TRAVEL_SERVICE_URL: http://travel-service:8083
      SESSION_SERVICE_URL: http://session-service:8084
      EVENT_SERVICE_URL: http://event-service:8085
    ports:
      - "8080:8080"

  player-service:
    build: ./player-service
    container_name: blueroute-player-service
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blueroute
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SESSION_SERVICE_URL: http://session-service:8084
    ports:
      - "8081:8081"

  ship-service:
    build: ./ship-service
    container_name: blueroute-ship-service
    depends_on:
      - postgres
      - player-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blueroute
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PLAYER_SERVICE_URL: http://player-service:8081
    ports:
      - "8082:8082"

  travel-service:
    build: ./travel-service
    container_name: blueroute-travel-service
    depends_on:
      - postgres
      - player-service
      - ship-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blueroute
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PLAYER_SERVICE_URL: http://player-service:8081
      SHIP_SERVICE_URL: http://ship-service:8082
    ports:
      - "8083:8083"

  session-service:
    build:
      context: ./session-service
    container_name: session-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blueroute
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      BACKEND_URL: http://backend:8080
      PLAYER_SERVICE_URL: http://player-service:8081
      SHIP_SERVICE_URL: http://ship-service:8082
      TRAVEL_SERVICE_URL: http://travel-service:8083
      EVENT_SERVICE_URL: http://event-service:8085
    depends_on:
      - postgres
      - player-service
      - ship-service
      - travel-service
      - event-service

  event-service:
    build: ./event-service
    container_name: blueroute-event-service
    depends_on:
      - postgres
      - player-service
      - ship-service
      - travel-service
    environment:
      TRAVEL_SERVICE_URL: http://travel-service:8083
      SHIP_SERVICE_URL: http://ship-service:8082
      PLAYER_SERVICE_URL: http://player-service:8081
      SESSION_SERVICE_URL: http://session-service:8084
      BACKEND_URL: http://backend:8080
    ports:
      - "8085:8085"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://10.0.40.187:8080
    container_name: blueroute-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:

