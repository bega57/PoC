services:
  postgres:
    image: postgres:16
    container_name: blueroute-postgres
    environment:
      POSTGRES_DB: blueroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend/blue-route
    container_name: blueroute-backend
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/blueroute
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: blueroute-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:

