spring.datasource.url=jdbc:postgresql://blueroute-postgres:5432/blueroute
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

player.service.url=http://localhost:8081
ship.service.url=http://localhost:8082
travel.service.url=http://localhost:8083
session.service.url=http://localhost:8084
event.service.url=${EVENT_SERVICE_URL:http://localhost:8085}

game.tick.rate=5000
session.heartbeat.timeout-seconds=20